<!doctype html>
<meta charset="utf-8">
<title>brainscope</title>
<style>
  body { margin:0; background:#0d131c; color:#edf1f7; font:14px ui-monospace,Menlo,Consolas,monospace; }
  header { padding:14px 20px 10px; display:flex; justify-content:space-between; align-items:baseline; }
  h1 { margin:0; font-size:18px; letter-spacing:.02em; }
  h1 span { color:#e8b45a; }
  #status { color:#64748b; font-size:12px; }
  #wrap { padding:0 20px 16px; }
  canvas { width:100%; background:#101927; border:1px solid #223047; display:block; }
  #text { margin-top:10px; padding:12px 14px; background:#101927; border:1px solid #223047;
          min-height:64px; max-height:180px; overflow-y:auto; white-space:pre-wrap;
          font-size:13px; line-height:1.5; color:#c7d2e0; }
  #legend { margin-top:6px; color:#64748b; font-size:11.5px; }
  #chat { margin-top:10px; display:flex; gap:8px; }
  #msg { flex:1; background:#101927; border:1px solid #223047; color:#edf1f7;
         font:13px ui-monospace,Menlo,Consolas,monospace; padding:9px 12px; outline:none; }
  #msg:focus { border-color:#3d5a80; }
  #send { background:#3d5a80; color:#edf1f7; border:none; padding:9px 18px;
          font:600 13px ui-monospace,Menlo,Consolas,monospace; cursor:pointer; }
  #send:hover { background:#4a6b96; }
  #tip { position:fixed; display:none; background:#1c2940; border:1px solid #3d5a80;
         padding:4px 8px; font-size:11.5px; pointer-events:none; z-index:10; }
  .btn { background:#162233; color:#97a7bc; border:1px solid #223047; padding:5px 10px;
         font:600 12px ui-monospace,Menlo,Consolas,monospace; cursor:pointer; }
  .btn:hover { color:#edf1f7; border-color:#3d5a80; }
  .btn.on { color:#e5636b; border-color:#e5636b; }
  #dir { background:#162233; color:#edf1f7; border:1px solid #223047; font:12px ui-monospace,monospace; padding:4px; }
  #sval { color:#e8b45a; font-size:12px; min-width:28px; display:inline-block; }
</style>
<header>
  <h1>brain<span>scope</span></h1>
  <div style="display:flex; gap:10px; align-items:center">
    <span id="steerbox" style="display:none">
      <select id="dir"></select>
      <input id="strength" type="range" min="-3" max="3" step="0.1" value="0" style="vertical-align:middle">
      <span id="sval">0.0</span>
    </span>
    <button id="rec" class="btn">● nahrát</button>
    <button id="snap" class="btn">PNG</button>
    <span id="status">čekám na spojení…</span>
  </div>
</header>
<div id="wrap">
  <canvas id="heat" height="360"></canvas>
  <div id="text"></div>
  <div id="chat">
    <input id="msg" placeholder="…nebo napiš modelu přímo odsud (Enter)" autocomplete="off">
    <button id="send">poslat</button>
  </div>
  <div id="legend">osa x = generované tokeny · osa y = vrstvy (dole první) · barva = norma reziduálního streamu (relativně po vrstvě) · najetím na heatmapu detail</div>
</div>
<div id="tip"></div>
<script>
const canvas = document.getElementById("heat");
const ctx = canvas.getContext("2d");
const textEl = document.getElementById("text");
const statusEl = document.getElementById("status");

let cols = [];        // per token: array of layer norms
let baseline = null;  // per-layer running mean for relative coloring

function color(t) {   // 0..1 -> dark blue -> green -> amber
  const stops = [[16,25,39],[38,90,128],[61,189,125],[232,180,90]];
  const x = Math.max(0, Math.min(1, t)) * (stops.length - 1);
  const i = Math.floor(x), f = x - i;
  const a = stops[i], b = stops[Math.min(i + 1, stops.length - 1)];
  return `rgb(${a.map((v,k)=>Math.round(v+(b[k]-v)*f)).join(",")})`;
}

function draw() {
  const W = canvas.width = canvas.clientWidth * devicePixelRatio;
  const H = canvas.height;
  if (!cols.length) return;
  const nLayers = cols[0].length;
  const cw = Math.max(2, Math.min(14, W / Math.max(60, cols.length)));
  const ch = H / nLayers;
  const start = Math.max(0, cols.length - Math.floor(W / cw));
  for (let x = start; x < cols.length; x++) {
    for (let l = 0; l < nLayers; l++) {
      const rel = cols[x][l] / (baseline[l] || 1);   // relative to per-layer mean
      ctx.fillStyle = color((rel - 0.7) / 0.9);
      ctx.fillRect((x - start) * cw, H - (l + 1) * ch, cw - 0.5, ch - 0.5);
    }
  }
}

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => statusEl.textContent = "připojeno — pošli něco appce";
  ws.onclose = () => { statusEl.textContent = "odpojeno, zkouším znovu…"; setTimeout(connect, 1500); };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "start") {
      cols = []; tokens = []; textEl.textContent = "";
      statusEl.textContent = `generuji · ${msg.model} · prompt ${msg.prompt_tokens} tokenů`;
    } else if (msg.type === "token") {
      textEl.textContent += msg.text;
      if (!msg.norms.length) { textEl.scrollTop = textEl.scrollHeight; return; }
      tokens.push(msg.text);
      if (!baseline) baseline = msg.norms.slice();
      else baseline = baseline.map((b, i) => b * 0.98 + msg.norms[i] * 0.02);
      cols.push(msg.norms);
      textEl.scrollTop = textEl.scrollHeight;
      draw();
    } else if (msg.type === "done") {
      statusEl.textContent = `hotovo · ${msg.completion_tokens} tokenů`;
    }
  };
}
connect();

// built-in chat: try the brain without any app attached
const msgEl = document.getElementById("msg");
let tokens = [];
async function send() {
  const text = msgEl.value.trim();
  if (!text) return;
  msgEl.value = ""; msgEl.disabled = true;
  try {
    await fetch("/v1/chat/completions", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({messages: [{role: "user", content: text}], max_tokens: 512}),
    });
  } finally { msgEl.disabled = false; msgEl.focus(); }
}
document.getElementById("send").onclick = send;
msgEl.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

// hover tooltip: token / layer / relative norm
const tip = document.getElementById("tip");
canvas.addEventListener("mousemove", (ev) => {
  if (!cols.length) { tip.style.display = "none"; return; }
  const rect = canvas.getBoundingClientRect();
  const W = canvas.width, H = canvas.height;
  const nLayers = cols[0].length;
  const cw = Math.max(2, Math.min(14, W / Math.max(60, cols.length)));
  const start = Math.max(0, cols.length - Math.floor(W / cw));
  const x = start + Math.floor((ev.clientX - rect.left) * devicePixelRatio / cw);
  const l = nLayers - 1 - Math.floor((ev.clientY - rect.top) * devicePixelRatio / (H / nLayers));
  if (x < 0 || x >= cols.length || l < 0 || l >= nLayers) { tip.style.display = "none"; return; }
  const rel = cols[x][l] / (baseline[l] || 1);
  tip.textContent = `token ${x}${tokens[x] ? " " + JSON.stringify(tokens[x]) : ""} · vrstva ${l} · ${rel.toFixed(2)}× průměr`;
  tip.style.left = (ev.clientX + 14) + "px";
  tip.style.top = (ev.clientY + 14) + "px";
  tip.style.display = "block";
});
canvas.addEventListener("mouseleave", () => tip.style.display = "none");

// PNG snapshot
document.getElementById("snap").onclick = () => {
  const a = document.createElement("a");
  a.download = `brainscope-${Date.now()}.png`;
  a.href = canvas.toDataURL("image/png");
  a.click();
};

// WebM recording of the heatmap (canvas capture) — LinkedIn video maker
let recorder = null, chunks = [];
const recBtn = document.getElementById("rec");
recBtn.onclick = () => {
  if (recorder) {
    recorder.stop(); recorder = null;
    recBtn.classList.remove("on"); recBtn.textContent = "● nahrát";
    return;
  }
  chunks = [];
  recorder = new MediaRecorder(canvas.captureStream(30), {mimeType: "video/webm"});
  recorder.ondataavailable = (e) => chunks.push(e.data);
  recorder.onstop = () => {
    const a = document.createElement("a");
    a.download = `brainscope-${Date.now()}.webm`;
    a.href = URL.createObjectURL(new Blob(chunks, {type: "video/webm"}));
    a.click();
  };
  recorder.start();
  recBtn.classList.add("on"); recBtn.textContent = "■ stop";
};

// steering controls (shown only when the server has directions loaded)
const steerbox = document.getElementById("steerbox");
const dirSel = document.getElementById("dir");
const strengthEl = document.getElementById("strength");
const svalEl = document.getElementById("sval");
async function initSteer() {
  const r = await fetch("/directions").then(r => r.json()).catch(() => null);
  if (!r || !r.directions.length) return;
  dirSel.innerHTML = r.directions.map(d => `<option>${d}</option>`).join("");
  steerbox.style.display = "inline";
  if (r.steer) { dirSel.value = r.steer.name; strengthEl.value = r.steer.strength; svalEl.textContent = (+r.steer.strength).toFixed(1); }
}
async function pushSteer() {
  svalEl.textContent = (+strengthEl.value).toFixed(1);
  await fetch("/steer", {method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({name: dirSel.value, strength: +strengthEl.value})});
}
strengthEl.addEventListener("change", pushSteer);
dirSel.addEventListener("change", pushSteer);
initSteer();
</script>
