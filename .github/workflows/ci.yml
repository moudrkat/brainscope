name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install from a clean checkout
        run: pip install .
      - name: Smoke test
        run: |
          python -c "from brainscope.server import STATIC; assert STATIC.exists(), 'static assets missing from package'"
          brainscope --help

  docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Free runner disk for the CUDA base image
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push CPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/brainscope:cpu
            ghcr.io/${{ github.repository_owner }}/brainscope:latest
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - name: Build and push CUDA image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cuda
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/brainscope:cuda
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
